<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muraai Contract Reminder</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f4;
        --panel: #ffffff;
        --panel-soft: #fdfdfb;
        --line: #deded8;
        --line-strong: #111111;
        --text: #111111;
        --muted: #77776f;
        --accent: #d71920;
        --accent-dark: #a80f15;
        --danger: #d71920;
        --warn: #7b5b00;
        --shadow: 0 18px 45px rgba(17, 17, 17, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 1px 1px, rgba(17, 17, 17, 0.06) 1px, transparent 0),
          var(--bg);
        background-size: 18px 18px;
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Arial, Helvetica, sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px clamp(18px, 4vw, 44px);
        border-bottom: 1px solid var(--line-strong);
        background: rgba(247, 247, 244, 0.92);
        backdrop-filter: blur(16px);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 21px;
        line-height: 1;
        letter-spacing: 0;
      }

      h2 {
        font-size: 16px;
        letter-spacing: 0;
      }

      h3 {
        font-size: 15px;
      }

      main {
        display: grid;
        grid-template-columns: minmax(280px, 340px) 1fr;
        gap: 20px;
        padding: clamp(16px, 4vw, 44px);
        max-width: 1280px;
        margin: 0 auto;
      }

      section,
      aside {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      aside {
        padding: 18px;
        align-self: start;
        position: sticky;
        top: 96px;
      }

      .content {
        display: grid;
        gap: 18px;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        background: var(--panel-soft);
        border-radius: 8px 8px 0 0;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .metric {
        padding: 20px 18px;
        border-right: 1px solid var(--line);
        min-height: 106px;
        display: grid;
        align-content: center;
      }

      .metric:last-child {
        border-right: 0;
      }

      .metric strong {
        display: block;
        font-size: 40px;
        line-height: 1.1;
        font-weight: 800;
        letter-spacing: 0;
      }

      .metric span,
      label,
      .muted {
        color: var(--muted);
        font-size: 12px;
      }

      form {
        display: grid;
        gap: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 7px;
        font-weight: 650;
        letter-spacing: 0;
      }

      input,
      textarea,
      button {
        width: 100%;
        min-height: 42px;
        border-radius: 8px;
        font: inherit;
      }

      input,
      textarea {
        border: 1px solid var(--line);
        padding: 9px 11px;
        background: #fbfbf8;
        color: var(--text);
        outline: none;
        transition:
          border-color 140ms ease,
          box-shadow 140ms ease,
          background 140ms ease;
      }

      input:focus,
      textarea:focus {
        border-color: var(--line-strong);
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
      }

      textarea {
        min-height: 82px;
        resize: vertical;
      }

      button {
        cursor: pointer;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #ffffff;
        padding: 9px 14px;
        font-weight: 800;
        letter-spacing: 0;
        transition:
          background 140ms ease,
          border-color 140ms ease,
          transform 140ms ease;
      }

      button:hover {
        background: var(--accent-dark);
        border-color: var(--accent-dark);
      }

      button:active {
        transform: translateY(1px);
      }

      button.secondary {
        background: #ffffff;
        color: var(--text);
        border-color: var(--line-strong);
      }

      button.secondary:hover {
        background: #111111;
        border-color: #111111;
        color: #ffffff;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #ffffff;
      }

      th,
      td {
        padding: 14px 18px;
        text-align: left;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: var(--panel-soft);
      }

      .status {
        display: inline-block;
        min-width: 88px;
        border-radius: 999px;
        padding: 5px 9px;
        text-align: center;
        font-size: 12px;
        font-weight: 700;
        background: #eeeeea;
        color: #111111;
        border: 1px solid #d8d8d2;
      }

      .status.overdue {
        background: #fff1f1;
        color: var(--danger);
        border-color: #f3b8b8;
      }

      .status.upcoming {
        background: #fff7d6;
        color: var(--warn);
        border-color: #ecd98b;
      }

      .hidden {
        display: none;
      }

      .notice {
        min-height: 21px;
        color: var(--muted);
        font-size: 13px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle, #111111 1.5px, transparent 2px),
          #ffffff;
        background-size: 7px 7px;
      }

      .brand-mark span {
        color: var(--accent);
        font-weight: 900;
        font-size: 16px;
        line-height: 1;
        text-shadow: 0 0 0 #ffffff;
      }

      .table-wrap {
        overflow-x: auto;
      }

      @media (max-width: 860px) {
        main {
          grid-template-columns: 1fr;
        }

        .metrics,
        .grid {
          grid-template-columns: 1fr;
        }

        .metric {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        aside {
          position: static;
        }

        header {
          align-items: flex-start;
        }
      }

      @media (max-width: 640px) {
        table,
        thead,
        tbody,
        tr,
        th,
        td {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          padding: 12px 0;
          border-bottom: 1px solid var(--line);
        }

        td {
          border-bottom: 0;
          padding: 7px 18px;
        }

        td::before {
          content: attr(data-label);
          display: block;
          color: var(--muted);
          font-size: 11px;
          font-weight: 800;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          margin-bottom: 4px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"><span>M</span></div>
        <div>
          <h1>Muraai Contract Reminder</h1>
          <p class="muted" id="sessionLabel">Not signed in</p>
        </div>
      </div>
      <button class="secondary hidden" id="logoutButton" type="button">Sign out</button>
    </header>

    <main>
      <aside>
        <h2>Access</h2>
        <p class="notice" id="authNotice"></p>
        <form id="authForm">
          <label>
            Username
            <input id="username" autocomplete="username" placeholder="john_doe" />
          </label>
          <label>
            Email
            <input id="email" type="email" autocomplete="email" required placeholder="john@example.com" />
          </label>
          <label>
            Password
            <input id="password" type="password" autocomplete="current-password" required />
          </label>
          <div class="grid">
            <button type="submit" data-mode="login">Login</button>
            <button class="secondary" type="submit" data-mode="register">Register</button>
          </div>
        </form>
      </aside>

      <div class="content">
        <section>
          <div class="section-header">
            <h2>Dashboard</h2>
            <button class="secondary" id="refreshButton" type="button">Refresh</button>
          </div>
          <div class="metrics">
            <div class="metric">
              <strong id="totalContracts">0</strong>
              <span>Total contracts</span>
            </div>
            <div class="metric">
              <strong id="upcomingContracts">0</strong>
              <span>Upcoming expiries</span>
            </div>
            <div class="metric">
              <strong id="overdueContracts">0</strong>
              <span>Expired contracts</span>
            </div>
          </div>
        </section>

        <section>
          <div class="section-header">
            <h2>Add Contract</h2>
            <p class="notice" id="contractNotice"></p>
          </div>
          <form id="contractForm" style="padding: 16px">
            <div class="grid">
              <label>
                Company
                <input id="companyName" required />
              </label>
              <label>
                Contract
                <input id="contractName" required />
              </label>
              <label>
                Start date
                <input id="startDate" type="date" required />
              </label>
              <label>
                End date
                <input id="endDate" type="date" required />
              </label>
              <label>
                Renewal date (reference)
                <input id="renewalDate" type="date" required />
              </label>
              <label>
                Notification email
                <input id="notificationEmail" type="email" required />
              </label>
            </div>
            <label>
              Notes
              <textarea id="notes"></textarea>
            </label>
            <button type="submit">Create contract</button>
          </form>
        </section>

        <section>
          <div class="section-header">
            <h2>Contracts</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Contract</th>
                  <th>Company</th>
                  <th>End date</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="contractsTable"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script>
      const state = {
        token: localStorage.getItem("muraai_token"),
        user: JSON.parse(localStorage.getItem("muraai_user") || "null"),
      };

      const byId = (id) => document.getElementById(id);

      function headers() {
        return {
          "Content-Type": "application/json",
          Authorization: `Bearer ${state.token}`,
        };
      }

      function setSession(user, token) {
        state.user = user;
        state.token = token;
        localStorage.setItem("muraai_user", JSON.stringify(user));
        localStorage.setItem("muraai_token", token);
        renderSession();
        loadDashboard();
      }

      function renderSession() {
        byId("sessionLabel").textContent = state.user
          ? `${state.user.username} - ${state.user.email}`
          : "Not signed in";
        byId("logoutButton").classList.toggle("hidden", !state.user);
      }

      async function api(path, options = {}) {
        const response = await fetch(path, options);
        const text = await response.text();
        const payload = text ? JSON.parse(text) : null;
        if (!response.ok) {
          throw new Error(payload?.error || payload?.message || "Request failed");
        }
        return payload;
      }

      async function loadDashboard() {
        if (!state.token) return;
        const [dashboard, contracts] = await Promise.all([
          api("/api/contracts/dashboard", { headers: headers() }),
          api("/api/contracts", { headers: headers() }),
        ]);
        byId("totalContracts").textContent = dashboard.total_contracts;
        byId("upcomingContracts").textContent = dashboard.upcoming_count;
        byId("overdueContracts").textContent = dashboard.overdue_count;
        renderContracts(contracts);
      }

      function renderContracts(contracts) {
        const today = new Date().toISOString().slice(0, 10);
        byId("contractsTable").innerHTML = contracts
          .map((contract) => {
            const days = Math.ceil((new Date(contract.end_date) - new Date(today)) / 86400000);
            const statusClass = days < 0 ? "overdue" : days <= 30 ? "upcoming" : "";
            const status = days < 0 ? "Expired" : days <= 30 ? "Ending soon" : "Tracked";
            return `
              <tr>
                <td data-label="Contract"><strong>${contract.contract_name}</strong><br /><span class="muted">${contract.notes || ""}</span></td>
                <td data-label="Company">${contract.company_name}</td>
                <td data-label="End date">${contract.end_date}</td>
                <td data-label="Status"><span class="status ${statusClass}">${status}</span></td>
              </tr>
            `;
          })
          .join("");
      }

      byId("authForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const mode = event.submitter.dataset.mode;
        byId("authNotice").textContent = "";
        try {
          const payload = {
            email: byId("email").value,
            password: byId("password").value,
          };
          if (mode === "register") {
            payload.username = byId("username").value;
          }
          const result = await api(`/api/auth/${mode}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          setSession(result.user, result.token);
        } catch (error) {
          byId("authNotice").textContent = error.message;
        }
      });

      byId("contractForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        byId("contractNotice").textContent = "";
        try {
          await api("/api/contracts", {
            method: "POST",
            headers: headers(),
            body: JSON.stringify({
              company_name: byId("companyName").value,
              contract_name: byId("contractName").value,
              start_date: byId("startDate").value,
              end_date: byId("endDate").value,
              renewal_date: byId("renewalDate").value,
              notification_enabled: true,
              notification_email: byId("notificationEmail").value,
              notification_mobile: false,
              notes: byId("notes").value,
            }),
          });
          event.target.reset();
          byId("contractNotice").textContent = "Contract created";
          loadDashboard();
        } catch (error) {
          byId("contractNotice").textContent = error.message;
        }
      });

      byId("logoutButton").addEventListener("click", () => {
        localStorage.removeItem("muraai_user");
        localStorage.removeItem("muraai_token");
        state.user = null;
        state.token = null;
        renderSession();
        renderContracts([]);
      });

      byId("refreshButton").addEventListener("click", loadDashboard);
      renderSession();
      loadDashboard().catch(() => {});
    </script>
  </body>
</html>
